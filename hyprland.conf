# hyprland.conf
# By OldJobobo (https://github.com/OldJobobo)
#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgba(ffff00ff) rgba(f88416ff) rgba(976addff) rgba(2976d1ff) rgba(ffff00ff) 95deg
$inactiveBorderColor = rgba(ab919144)
$shadowColor = rgba(00000088)

layerrule = no_anim off, match:namespace walker

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 3
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 0
    active_opacity = 0.97
    inactive_opacity = 0.94
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 4
        passes = 3
        noise = 0.16
        contrast = 1.15
        brightness = 1.0
        vibrancy = 0.25
        vibrancy_darkness = 0.22
    }

    shadow {
        enabled = yes
        range = 18
        render_power = 3
        color = $shadowColor
    }
}

animations {
    enabled = yes
    bezier = livewire, 0.22, 1, 0.36, 1
    bezier = hotdrop, 0.18, 0.9, 0.2, 1
    animation = windows, 1, 4, hotdrop
    animation = windowsIn, 1, 5, livewire, popin 12%
    animation = windowsOut, 1, 4, hotdrop, popin 78%
    animation = windowsMove, 1, 4, livewire
    animation = border, 1, 5, livewire
    animation = borderangle, 1, 22, linear, once
    animation = fade, 1, 4, hotdrop
    animation = layers, 1, 4, hotdrop, slidefade
    animation = layersIn, 1, 4, livewire, slidefade
    animation = layersOut, 1, 4, hotdrop, fade
    animation = workspaces, 1, 4, livewire, slidefade
}

